name: Build Agents

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Add targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Build for Apple Silicon (ARM64)
        run: cargo build --release --target aarch64-apple-darwin
      
      - name: Build for Intel (x86_64)
        run: cargo build --release --target x86_64-apple-darwin
      
      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/openclaw-agent \
            target/x86_64-apple-darwin/release/openclaw-agent \
            -output openclaw-agent-universal
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-agent-mac
          path: openclaw-agent-universal

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Build for Linux x86_64
        run: cargo build --release --target x86_64-unknown-linux-gnu
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-agent-linux
          path: target/x86_64-unknown-linux-gnu/release/openclaw-agent
